<!doctype html>
<html lang="vi" data-theme="light" data-preset="la-blue" data-color-style="solid">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="L&A Onboarding 2026 - Hệ thống đào tạo nhân viên mới của Nesso" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title></title>
  <script>
    // Restore cached branding trước khi React mount — tránh flash default
    try {
      var b = sessionStorage.getItem('__branding');
      if (b) {
        var d = JSON.parse(b);
        if (d.t) document.title = d.t;
        if (d.f) {
          var link = document.querySelector("link[rel*='icon']");
          if (link) { link.type = 'image/png'; link.href = d.f; }
        }
      }
    } catch(e) {}
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
